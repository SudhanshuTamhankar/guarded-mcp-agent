services:
  - type: web
    name: guarded-mcp-api
    env: node
    buildCommand: npm install && npm run build --workspace=api
    startCommand: npm run start --workspace=api
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: file:/data/prod.db
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: EXA_API_KEY
        sync: false
      - key: SANDBOX_ROOT
        value: ../../sandbox
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: guarded-mcp-web
    env: static
    buildCommand: npm install && npm run build --workspace=web
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: guarded-mcp-api
          envVarKey: RENDER_EXTERNAL_URL
